<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will AI Team</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020818;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  .scene {
    width: 900px;
    height: 600px;
    position: relative;
    background: radial-gradient(ellipse at 50% 80%, #001a3a 0%, #020818 70%);
    overflow: hidden;
  }

  /* Neon lines background */
  .neon-lines {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
  }

  .line-left {
    position: absolute;
    width: 3px;
    height: 70%;
    bottom: 0;
    left: 30%;
    background: linear-gradient(to top, #00e5ff, transparent);
    transform: rotate(-25deg);
    transform-origin: bottom center;
    box-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff66;
  }

  .line-right {
    position: absolute;
    width: 3px;
    height: 70%;
    bottom: 0;
    right: 30%;
    background: linear-gradient(to top, #00e5ff, transparent);
    transform: rotate(25deg);
    transform-origin: bottom center;
    box-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff66;
  }

  /* Floor glow */
  .floor-glow {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 120px;
    background: radial-gradient(ellipse, #00e5ff22 0%, transparent 70%);
  }

  /* Team label */
  .team-label {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  .team-label h1 {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
    text-shadow: 0 0 20px #00e5ff, 0 0 40px #00e5ff88;
  }

  .team-label p {
    font-size: 13px;
    color: #00e5ffaa;
    letter-spacing: 4px;
    margin-top: 4px;
  }

  /* Characters container */
  .characters {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: flex-end;
  }

  /* Individual character */
  .character {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .character-body {
    position: relative;
    width: 130px;
    height: 280px;
  }

  /* SVG character illustration */
  .char-svg {
    width: 130px;
    height: 280px;
    filter: drop-shadow(0 0 15px var(--glow-color));
  }

  .character-name {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-top: 10px;
    text-shadow: 0 0 10px var(--glow-color);
  }

  .character-role {
    font-size: 10px;
    color: #00e5ff99;
    letter-spacing: 2px;
    margin-top: 3px;
  }

  /* Holographic panel */
  .holo-panel {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    width: 160px;
    height: 200px;
    border: 1px solid #00e5ff44;
    background: linear-gradient(135deg, #00e5ff08, #0066ff08);
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 0 20px #00e5ff22, inset 0 0 20px #00e5ff08;
    z-index: 5;
  }

  .holo-title {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    color: #00e5ffaa;
    letter-spacing: 2px;
    margin-bottom: 10px;
    border-bottom: 1px solid #00e5ff33;
    padding-bottom: 6px;
  }

  .holo-bar {
    margin-bottom: 8px;
  }

  .holo-bar-label {
    font-size: 8px;
    color: #00e5ff88;
    margin-bottom: 3px;
    letter-spacing: 1px;
  }

  .holo-bar-track {
    height: 4px;
    background: #00e5ff15;
    border-radius: 2px;
    overflow: hidden;
  }

  .holo-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00e5ff, #0066ff);
    border-radius: 2px;
    box-shadow: 0 0 6px #00e5ff;
  }

  .holo-circle {
    width: 60px;
    height: 60px;
    border: 1px solid #00e5ff44;
    border-radius: 50%;
    margin: 10px auto 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px #00e5ff22;
  }

  .holo-circle::before {
    content: '';
    position: absolute;
    width: 45px;
    height: 45px;
    border: 1px solid #00e5ff33;
    border-radius: 50%;
  }

  .holo-circle-dot {
    width: 6px;
    height: 6px;
    background: #00e5ff;
    border-radius: 50%;
    box-shadow: 0 0 10px #00e5ff;
  }

  /* Floating particles */
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #00e5ff;
    border-radius: 50%;
    box-shadow: 0 0 4px #00e5ff;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 1; }
    100% { transform: translateY(-200px) translateX(20px); opacity: 0; }
  }
</style>
</head>
